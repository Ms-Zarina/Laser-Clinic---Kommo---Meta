services:
  app:
    build: .
    image: laser-clinic-kommo-meta:latest
    container_name: laser-clinic-kommo-meta
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      # Bind only to localhost so Nginx is the single public entry point
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
